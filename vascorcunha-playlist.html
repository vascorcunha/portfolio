<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist Covers</title>
  <link rel="stylesheet" href="styles-playlist.css">
</head>
<body>

  <!-- ============================================================
       TOP BAR — centered logo
       ============================================================ -->
  <header class="topbar" role="banner">
    <a href="index.html" class="logo-wrap" aria-label="Home">
      <img class="project-logo"
           src="images/Logo-Black.svg"
           alt="V Logo">
    </a>
  </header>

  <!-- ============================================================
       GRID
       Each tile is a <button> that opens the shared lightbox.
       Buttons (instead of <a href="#pN">) avoid URL hash hopping
       and keep the back button clean.
       ============================================================ -->
  <main class="page" role="main">
  <div class="project-grid" id="projectGrid">
    <button type="button" class="tile" data-full="images/playlistcover-01.jpg" aria-label="Open Playlist Cover 01">
      <img src="images/playlistcover-01.jpg" alt="Playlist Cover 01" loading="lazy">
    </button>

  <!-- ============================================================
       LIGHTBOX — single shared overlay; img src is set by JS
       ============================================================ -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Image viewer">
    <button type="button" class="lightbox__close" id="lightboxClose" aria-label="Close">&times;</button>
    <img class="lightbox__img" id="lightboxImg" alt="">
  </div>

  <script src="js-playlist.js"></script>
